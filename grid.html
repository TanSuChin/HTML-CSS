<!DOCTYPE html>
<html>
  <head>
    <title>Grid Practice</title>
  </head>
  <body> 
    <div style="
      display: grid;
      /*below is to determine the size of grid, 3 column 1 row, each column 100px wide and last column is 200px wide
      1fr = takes up rest of the space available
      also can put 1fr 2fr*/
      grid-template-columns: 100px 100px 200px;">
      <div style="background-color: lightblue;">div 1</div>
      <div style="background-color: lightpink;">div 2</div>
      <div style="background-color: lightblue;">div 3</div>
    </div>
  </body>
</html>
